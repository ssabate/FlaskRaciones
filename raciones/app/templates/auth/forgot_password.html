{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Recuperar Contraseña</h2>
                <p class="text-center text-muted">Introduce tu correo electrónico y te ayudaremos a restablecer tu contraseña.</p>
                <form action="" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Buscar mi cuenta</button>
                    <p class="mt-3 text-center"><a href="{{ url_for('auth.login') }}">Volver a Iniciar Sesión</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
