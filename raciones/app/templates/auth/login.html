{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>
                <form action="" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Nombre de Usuario o Email</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                            <label class="form-check-label" for="remember_me">Recordarme</label>
                        </div>
                        <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                    <p class="mt-3 text-center">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
