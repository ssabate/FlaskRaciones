{% extends "base.html" %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h2>Registrar consumo</h2>
        <p class="text-muted mb-0">Selecciona un alimento e indica la cantidad en gramos o en raciones.</p>
    </div>
    <div class="col-auto">
        <a href="{{ url_for('main.foods') }}" class="btn btn-outline-primary">Gestionar alimentos</a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form action="{{ url_for('main.log_consumption') }}" method="post" id="logConsumptionForm">
                    <div class="mb-4">
                        <label class="form-label" for="foodSelect">Alimento</label>
                        <select class="form-select" name="food_id" id="foodSelect" required>
                            <option value="">Selecciona un alimento...</option>
                            {% for food in foods %}
                                <option value="{{ food.id }}">{{ food.nombre }} ({{ "%.1f"|format(food.hidratos_por_100g) }}g HC / 100g)</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="input_mode" id="modeGrams" value="grams" checked>
                            <label class="form-check-label" for="modeGrams">Introducir gramos</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="input_mode" id="modeRc" value="rc">
                            <label class="form-check-label" for="modeRc">Introducir RCs</label>
                        </div>
                        <small class="text-muted d-block mt-2">1 RC = {{ rc_grams }}g de hidratos.</small>
                    </div>

                    <div class="row g-3 align-items-end">
                        <div class="col-md-6" id="gramsGroup">
                            <label class="form-label" for="gramsInput">Gramos ingeridos</label>
                            <input type="number" name="cantidad_gramos" id="gramsInput" class="form-control" min="0.1" step="0.1" value="100" required>
                        </div>
                        <div class="col-md-6" id="rcGroup" style="display: none;">
                            <label class="form-label" for="rcInput">RCs consumidas</label>
                            <input type="number" name="cantidad_rc" id="rcInput" class="form-control" min="0.5" step="0.5" value="1">
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-end gap-2">
                        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">Volver</a>
                        <button type="submit" class="btn btn-success">Guardar consumo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const modeGrams = document.getElementById('modeGrams');
    const modeRc = document.getElementById('modeRc');
    const gramsGroup = document.getElementById('gramsGroup');
    const rcGroup = document.getElementById('rcGroup');
    const gramsInput = document.getElementById('gramsInput');
    const rcInput = document.getElementById('rcInput');
    const foodSelect = document.getElementById('foodSelect');

    function updateModeInputs() {
        const byGrams = modeGrams.checked;
        gramsGroup.style.display = byGrams ? 'block' : 'none';
        rcGroup.style.display = byGrams ? 'none' : 'block';
        gramsInput.required = byGrams;
        rcInput.required = !byGrams;
    }

    modeGrams.addEventListener('change', updateModeInputs);
    modeRc.addEventListener('change', updateModeInputs);
    updateModeInputs();

    foodSelect.addEventListener('change', function () {
        const foodId = this.value;
        if (!foodId) return;

        fetch(`/api/last_consumption/${foodId}`)
            .then(response => response.json())
            .then(data => {
                if (data.found) {
                    gramsInput.value = data.cantidad_gramos;
                    rcInput.value = data.cantidad_rc;
                } else {
                    gramsInput.value = 100;
                    rcInput.value = 1;
                }
            })
            .catch(() => {
                gramsInput.value = 100;
                rcInput.value = 1;
            });
    });
</script>
{% endblock %}
